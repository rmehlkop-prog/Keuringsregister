<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keuringsregister 2026 — Leef Kind</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #F7F6F3; color: #1A1A1A; min-height: 100vh; padding: 1.5rem 1rem 3rem; }
.wrap { max-width: 980px; margin: 0 auto; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap; }
.logo-row { display: flex; align-items: center; gap: 12px; }
.logo { width: 42px; height: 42px; background: #E8602C; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 16px; flex-shrink: 0; }
h1 { font-size: 20px; font-weight: 600; }
.period { font-size: 13px; color: #888; margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.header-badge { background: #FFF3EE; color: #C04A15; border: 1px solid #F5C4A8; border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: 600; }
.export-btn { background: white; border: 1px solid #DDDBD6; border-radius: 8px; padding: 6px 13px; font-size: 12px; color: #555; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: background 0.15s, border-color 0.15s; }
.export-btn:hover { background: #F0EEE9; border-color: #C5C1BB; }

/* KPI cards */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(175px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.kpi-card { background: white; border: 1px solid #ECEAE5; border-radius: 10px; padding: 14px 16px; transition: box-shadow 0.15s, transform 0.12s; cursor: default; }
.kpi-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.07); transform: translateY(-1px); }
.kpi-label { font-size: 12px; color: #888; margin-bottom: 6px; }
.kpi-value { font-size: 26px; font-weight: 600; line-height: 1; color: #1A1A1A; }
.kpi-sub { font-size: 12px; color: #999; margin-top: 5px; }
.kpi-good .kpi-value { color: #1A6B3A; }
.kpi-warn .kpi-value { color: #C04A15; }
.kpi-krit .kpi-value { color: #B02020; }

/* Progress bar in KPI card */
.kpi-bar { height: 4px; background: #F0EEE9; border-radius: 99px; margin-top: 10px; overflow: hidden; }
.kpi-bar-fill { height: 100%; border-radius: 99px; background: #E8602C; transition: width 0.8s ease; }

/* Tabs */
.tab-nav { display: flex; gap: 2px; border-bottom: 2px solid #ECEAE5; margin-bottom: 1.25rem; flex-wrap: wrap; }
.tab-btn { padding: 8px 15px; border: none; background: none; font-size: 13px; color: #888; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color 0.15s; white-space: nowrap; }
.tab-btn:hover { color: #444; }
.tab-btn.active { color: #E8602C; border-bottom-color: #E8602C; font-weight: 500; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Toolbar */
.toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.search-box { flex: 1; min-width: 160px; padding: 7px 12px; border: 1px solid #DDDBD6; border-radius: 8px; font-size: 13px; background: white; outline: none; transition: border-color 0.15s; }
.search-box:focus { border-color: #E8602C; }
.filter-btns { display: flex; gap: 4px; flex-wrap: wrap; }
.filter-btn { padding: 6px 12px; border-radius: 8px; border: 1px solid #DDDBD6; background: white; font-size: 12px; cursor: pointer; transition: all 0.15s; color: #555; }
.filter-btn:hover { border-color: #E8602C; color: #E8602C; }
.filter-btn.active { background: #E8602C; border-color: #E8602C; color: white; font-weight: 500; }
.result-count { font-size: 12px; color: #999; margin-left: auto; white-space: nowrap; }

/* Table */
.table-wrap { overflow-x: auto; background: white; border: 1px solid #ECEAE5; border-radius: 10px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #FAFAF8; border-bottom: 2px solid #ECEAE5; padding: 10px 13px; text-align: left; font-weight: 500; color: #555; white-space: nowrap; user-select: none; }
th.sortable { cursor: pointer; }
th.sortable:hover { color: #E8602C; }
th.sort-asc::after  { content: ' ↑'; color: #E8602C; }
th.sort-desc::after { content: ' ↓'; color: #E8602C; }
th.r, td.r { text-align: center; }
td { padding: 10px 13px; border-bottom: 1px solid #F0EEE9; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tbody tr.data-row { cursor: pointer; }
tbody tr.data-row:hover td { background: #FFF8F5; }
tbody tr.data-row.done-row td { opacity: 0.55; }
tbody tr.data-row.done-row td:first-child { text-decoration: line-through; color: #999; }

/* Badges */
.badge { display: inline-block; padding: 3px 9px; border-radius: 99px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.b-ok     { background: #E5F5EC; color: #1A6B3A; }
.b-soon   { background: #FEF3E2; color: #9A5A00; }
.b-open   { background: #E8F4FD; color: #1A5276; }
.b-krit   { background: #FEECEC; color: #B02020; }
.b-done   { background: #F0F0F0; color: #888; }

/* Checkbox cell */
.chk-cell { text-align: center; }
.chk { width: 18px; height: 18px; border: 2px solid #DDDBD6; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; background: white; font-size: 12px; flex-shrink: 0; }
.chk:hover { border-color: #E8602C; background: #FFF3EE; }
.chk.checked { background: #27AE60; border-color: #27AE60; color: white; }

/* No results */
.no-results { text-align: center; padding: 40px; color: #AAA; font-size: 14px; }

/* Section header row */
.section-row td { background: #F0F8FF; font-weight: 600; color: #1A5276; font-size: 12px; border-top: 2px solid #ECEAE5 !important; padding: 7px 13px; }

/* Kalender */
.kal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
.kal-month { background: white; border: 1px solid #ECEAE5; border-radius: 10px; padding: 16px; }
.kal-month-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.kal-month-title { font-size: 14px; font-weight: 600; color: #1A1A1A; }
.kal-count { font-size: 11px; color: #999; }
.kal-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #F5F5F3; cursor: pointer; transition: background 0.1s; border-radius: 6px; padding: 8px 6px; }
.kal-item:last-child { border-bottom: none; }
.kal-item:hover { background: #FFF8F5; }
.kal-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.kal-dot.ok   { background: #27AE60; }
.kal-dot.soon { background: #E6920A; }
.kal-dot.open { background: #2E86C1; }
.kal-dot.krit { background: #C0392B; }
.kal-dot.done { background: #CCC; }
.kal-name { font-size: 12px; flex: 1; color: #333; }
.kal-cat  { font-size: 11px; color: #AAA; }
.kal-empty { text-align: center; padding: 20px; color: #CCC; font-size: 13px; }

/* Detail modal */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
.modal-bg.open { display: flex; }
.modal { background: white; border-radius: 14px; padding: 28px; max-width: 520px; width: 100%; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.18); animation: slideUp 0.2s ease; }
@keyframes slideUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
.modal-close { position: absolute; top: 16px; right: 18px; background: none; border: none; font-size: 20px; color: #AAA; cursor: pointer; line-height: 1; }
.modal-close:hover { color: #555; }
.modal-eyebrow { font-size: 11px; color: #E8602C; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.modal-title { font-size: 20px; font-weight: 600; margin-bottom: 18px; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
.modal-kpi { background: #F7F6F3; border-radius: 8px; padding: 12px 14px; }
.modal-kpi-label { font-size: 11px; color: #999; margin-bottom: 4px; }
.modal-kpi-val { font-size: 16px; font-weight: 600; color: #1A1A1A; }
.modal-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 18px; }
.modal-btn { padding: 9px 18px; border-radius: 8px; border: none; font-size: 13px; cursor: pointer; font-weight: 500; transition: all 0.15s; }
.modal-btn-primary { background: #E8602C; color: white; }
.modal-btn-primary:hover { background: #C84A1C; }
.modal-btn-primary.done-state { background: #27AE60; }
.modal-btn-primary.done-state:hover { background: #1E8E4C; }
.modal-btn-secondary { background: #F0EEE9; color: #555; }
.modal-btn-secondary:hover { background: #E5E2DD; }
.modal-note-area { width: 100%; margin-top: 14px; padding: 10px 12px; border: 1px solid #DDDBD6; border-radius: 8px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 70px; outline: none; transition: border-color 0.15s; }
.modal-note-area:focus { border-color: #E8602C; }
.modal-note-label { font-size: 12px; color: #888; margin-bottom: 6px; }

/* Voortgang tab */
.prog-wrap { background: white; border: 1px solid #ECEAE5; border-radius: 10px; padding: 20px; margin-bottom: 14px; }
.prog-title { font-size: 14px; font-weight: 500; margin-bottom: 16px; color: #333; }
.prog-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.prog-row:last-child { margin-bottom: 0; }
.prog-label { font-size: 13px; color: #555; width: 160px; flex-shrink: 0; }
.prog-bar-wrap { flex: 1; height: 8px; background: #F0EEE9; border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 99px; transition: width 0.8s ease; }
.prog-pct { font-size: 13px; font-weight: 600; width: 42px; text-align: right; flex-shrink: 0; }

footer { text-align: center; margin-top: 2.5rem; font-size: 11px; color: #CCC; }
</style>
</head>
<body>
<div class="wrap">

<div class="header">
  <div class="logo-row">
    <div class="logo">LK</div>
    <div>
      <h1>Keuringsregister</h1>
      <div class="period">Leef Kind — Jaar 2026 · Locatie: <span id="loc-label" style="color:#E8602C;cursor:pointer" onclick="document.getElementById('loc-input').focus()">klik om in te vullen</span>
        <input id="loc-input" type="text" placeholder="Locatienaam…" style="border:none;border-bottom:1px solid #DDDBD6;background:transparent;font-size:13px;color:#1A1A1A;outline:none;margin-left:4px;width:180px;display:none" oninput="updateLocLabel(this.value)" onblur="toggleLocInput(false)" onkeydown="if(event.key==='Enter')this.blur()">
      </div>
    </div>
  </div>
  <div class="header-right">
    <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
    <div class="header-badge">2026</div>
  </div>
</div>

<div class="kpi-grid" id="kpi-grid"></div>

<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('overzicht',this)">Overzicht</button>
  <button class="tab-btn" onclick="switchTab('kalender',this)">Kalender</button>
  <button class="tab-btn" onclick="switchTab('voortgang',this)">Voortgang</button>
</div>

<!-- OVERZICHT -->
<div id="tab-overzicht" class="tab-panel active">
  <div class="toolbar">
    <input class="search-box" type="text" id="search-input" placeholder="🔍  Zoek keuring…" oninput="renderTable()">
    <div class="filter-btns" id="filter-btns">
      <button class="filter-btn active" onclick="setFilter('alle',this)">Alle</button>
      <button class="filter-btn" onclick="setFilter('open',this)">Openstaand</button>
      <button class="filter-btn" onclick="setFilter('soon',this)">⚠ Binnenkort</button>
      <button class="filter-btn" onclick="setFilter('krit',this)">✕ Verlopen</button>
      <button class="filter-btn" onclick="setFilter('done',this)">✓ Afgerond</button>
    </div>
    <span class="result-count" id="row-count"></span>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="sortable" data-col="naam" data-type="str">Keuring / Inspectie</th>
          <th class="sortable" data-col="cat" data-type="str">Categorie</th>
          <th class="sortable" data-col="freq" data-type="str">Frequentie</th>
          <th class="sortable" data-col="verantw" data-type="str">Verantw.</th>
          <th class="sortable" data-col="maand" data-type="num">Gepland</th>
          <th>Status</th>
          <th class="r">Afgerond</th>
        </tr>
      </thead>
      <tbody id="tbl-body"></tbody>
    </table>
  </div>
</div>

<!-- KALENDER -->
<div id="tab-kalender" class="tab-panel">
  <div class="kal-grid" id="kal-grid"></div>
</div>

<!-- VOORTGANG -->
<div id="tab-voortgang" class="tab-panel">
  <div class="prog-wrap">
    <div class="prog-title">Voortgang per categorie</div>
    <div id="prog-cats"></div>
  </div>
  <div class="prog-wrap">
    <div class="prog-title">Voortgang per kwartaal</div>
    <div id="prog-kw"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="closeModalBg(event)">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('modal-bg').classList.remove('open')">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<footer>Leef Kind · Keuringsregister 2026 · Intern gebruik</footer>
</div>

<script>
// ===================== DATA =====================
const MAANDEN = ['Jan','Feb','Mrt','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];
const NOW_MONTH = new Date().getMonth() + 1; // 1-12

const KEURINGEN = [
  // Brandveiligheid
  { id:1,  cat:'Brandveiligheid', naam:'Brandblusser keuring (NEN 2559)',                freq:'Jaarlijks',     verantw:'Facilitair', maand:3,  maand2:null },
  { id:2,  cat:'Brandveiligheid', naam:'Noodverlichting / vluchtwegaanduiding',          freq:'Jaarlijks',     verantw:'Facilitair', maand:6,  maand2:null },
  { id:3,  cat:'Brandveiligheid', naam:'Brandmeldinstallatie — onderhoud (NEN 2654-1)', freq:'Halfjaarlijks', verantw:'Facilitair', maand:3,  maand2:9  },
  { id:4,  cat:'Brandveiligheid', naam:'Brandmeldinstallatie — inspectie (NEN 2654-1)', freq:'Jaarlijks',     verantw:'Facilitair', maand:9,  maand2:null },
  { id:5,  cat:'Brandveiligheid', naam:'Ontruimingsalarminstallatie',                    freq:'Jaarlijks',     verantw:'Facilitair', maand:9,  maand2:null },
  { id:6,  cat:'Brandveiligheid', naam:'Rookmelders testen & logboek',                  freq:'Halfjaarlijks', verantw:'BHV',        maand:3,  maand2:9  },
  { id:7,  cat:'Brandveiligheid', naam:'Branddeuren & nooduitgangen inspectie',          freq:'Kwartaal',      verantw:'BHV',        maand:1,  maand2:null },
  { id:8,  cat:'Brandveiligheid', naam:'Ontruimingsoefening (logboek)',                  freq:'Jaarlijks',     verantw:'BHV',        maand:9,  maand2:null },
  // Elektra
  { id:9,  cat:'Elektrisch',      naam:'NEN 3140 elektrische installatiekeuring',        freq:'3–5 jaar',      verantw:'Vastgoed',   maand:9,  maand2:null },
  { id:10, cat:'Elektrisch',      naam:'PAT-keuring draagbare apparatuur',               freq:'Jaarlijks',     verantw:'Facilitair', maand:9,  maand2:null },
  { id:11, cat:'Elektrisch',      naam:'Noodstroomvoorziening keuring',                  freq:'Jaarlijks',     verantw:'Facilitair', maand:9,  maand2:null },
  // Gebouw
  { id:12, cat:'Gebouw',          naam:'CV-keuring / onderhoud',                         freq:'Jaarlijks',     verantw:'Facilitair', maand:9,  maand2:null },
  { id:13, cat:'Gebouw',          naam:'Gasinstallatie inspectie',                       freq:'Jaarlijks',     verantw:'Vastgoed',   maand:9,  maand2:null },
  { id:14, cat:'Gebouw',          naam:'Legionella watermonsters',                       freq:'Kwartaal',      verantw:'Facilitair', maand:1,  maand2:null },
  { id:15, cat:'Gebouw',          naam:'Legionella risicoanalyse update',                freq:'Jaarlijks',     verantw:'Facilitair', maand:9,  maand2:null },
  { id:16, cat:'Gebouw',          naam:'Ventilatiesystemen onderhoud & filterwisseling', freq:'Halfjaarlijks', verantw:'Facilitair', maand:3,  maand2:9  },
  { id:17, cat:'Gebouw',          naam:'Liftkeuring (indien aanwezig)',                  freq:'Halfjaarlijks', verantw:'Vastgoed',   maand:3,  maand2:9  },
  { id:18, cat:'Gebouw',          naam:'Dak- & gevelin­spectie',                         freq:'Jaarlijks',     verantw:'Vastgoed',   maand:5,  maand2:null },
  // Speeltoestellen
  { id:19, cat:'Speeltoestellen', naam:'Speeltoestellen jaarkeuring (NEN-EN 1176/1177)',freq:'Jaarlijks',     verantw:'Vastgoed',   maand:4,  maand2:null },
  { id:20, cat:'Speeltoestellen', naam:'Visuele inspectie speeltoestellen (maandelijks)',freq:'Maandelijks',   verantw:'Locatie',    maand:1,  maand2:null },
  { id:21, cat:'Speeltoestellen', naam:'Ondergrond / valzone inspectie',                freq:'Jaarlijks',     verantw:'Vastgoed',   maand:4,  maand2:null },
  // Arbo
  { id:22, cat:'Arbo',            naam:'RI&E actualisatie / toetsing',                   freq:'4 jaar / wijz', verantw:'HR/Arbo',    maand:9,  maand2:null },
  { id:23, cat:'Arbo',            naam:'BHV opleiding & herhaling medewerkers',          freq:'Jaarlijks',     verantw:'HR/BHV',     maand:9,  maand2:null },
  { id:24, cat:'Arbo',            naam:'EHBO-verbandkoffers controle inhoud',            freq:'Halfjaarlijks', verantw:'BHV',        maand:3,  maand2:9  },
  { id:25, cat:'Arbo',            naam:'Persoonlijke beschermingsmiddelen check',        freq:'Jaarlijks',     verantw:'Facilitair', maand:9,  maand2:null },
  // Toezicht
  { id:26, cat:'Toezicht',        naam:'GGD-inspectie voorbereiding',                    freq:'Jaarlijks',     verantw:'Management', maand:6,  maand2:null },
  { id:27, cat:'Toezicht',        naam:'VOG-register controle',                          freq:'Jaarlijks',     verantw:'HR',         maand:9,  maand2:null },
  { id:28, cat:'Toezicht',        naam:'Verzekeringen herbeoordeling',                   freq:'Jaarlijks',     verantw:'Inkoop',     maand:4,  maand2:null },
];

// State: gedaan + notities
const state = {};
KEURINGEN.forEach(k => {
  state[k.id] = { done: false, note: '', doneDate: null };
});

// Locate label
function updateLocLabel(v) {
  document.getElementById('loc-label').textContent = v || 'klik om in te vullen';
}
function toggleLocInput(show) {
  const inp = document.getElementById('loc-input');
  const lbl = document.getElementById('loc-label');
  if(show) { inp.style.display='inline'; lbl.style.display='none'; inp.focus(); }
  else { inp.style.display='none'; lbl.style.display='inline'; }
}
document.getElementById('loc-label').addEventListener('click', () => toggleLocInput(true));

// ===================== STATUS LOGIC =====================
function getStatus(k) {
  if(state[k.id].done) return 'done';
  return 'open';
}

function statusBadge(k) {
  const s = getStatus(k);
  const map = { done:'b-done', krit:'b-krit', soon:'b-soon', open:'b-open', ok:'b-ok' };
  const lbl = { done:'Afgerond', krit:'Verlopen', soon:'Binnenkort', open:'Gepland', ok:'OK' };
  return `<span class="badge ${map[s]}">${lbl[s]}</span>`;
}

function geplndLabel(k) {
  const m = MAANDEN[k.maand-1];
  return k.maand2 ? `${m} + ${MAANDEN[k.maand2-1]}` : m;
}

// ===================== KPI =====================
function renderKPI() {
  const total = KEURINGEN.length;
  const done  = KEURINGEN.filter(k => state[k.id].done).length;
  const krit  = KEURINGEN.filter(k => getStatus(k)==='krit').length;
  const soon  = KEURINGEN.filter(k => getStatus(k)==='soon').length;
  const pct   = Math.round(done/total*100);

  document.getElementById('kpi-grid').innerHTML = `
    <div class="kpi-card ${done===total?'kpi-good':''}">
      <div class="kpi-label">Totaal keuringen</div>
      <div class="kpi-value">${total}</div>
      <div class="kpi-sub">${done} afgerond · ${total-done} open</div>
      <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${pct}%;background:#E8602C"></div></div>
    </div>
    <div class="kpi-card ${done===total?'kpi-good':pct>50?'':'kpi-warn'}">
      <div class="kpi-label">Voortgang</div>
      <div class="kpi-value">${pct}%</div>
      <div class="kpi-sub">${done} van ${total} afgerond</div>
      <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${pct}%;background:${pct>=80?'#27AE60':pct>=40?'#E6920A':'#C0392B'}"></div></div>
    </div>
    <div class="kpi-card ${krit>0?'kpi-krit':'kpi-good'}">
      <div class="kpi-label">Verlopen</div>
      <div class="kpi-value">${krit}</div>
      <div class="kpi-sub">Keuringen te laat ${krit===0?'— alles op tijd':'— actie vereist'}</div>
    </div>
    <div class="kpi-card ${soon>0?'kpi-warn':'kpi-good'}">
      <div class="kpi-label">Binnenkort gepland</div>
      <div class="kpi-value">${soon}</div>
      <div class="kpi-sub">Gepland komende 2 maanden</div>
    </div>
  `;
  // Animate bars
  setTimeout(() => {
    document.querySelectorAll('.kpi-bar-fill').forEach(el => {
      const w = el.style.width; el.style.width='0';
      requestAnimationFrame(()=>{ el.style.width=w; });
    });
  }, 50);
}

// ===================== TABLE =====================
let sortCol = null, sortDir = 1;
let activeFilter = 'alle';

function setFilter(val, btn) {
  activeFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

document.querySelectorAll('th.sortable').forEach(th => {
  th.addEventListener('click', () => {
    if(sortCol === th.dataset.col) sortDir *= -1; else { sortCol = th.dataset.col; sortDir = 1; }
    document.querySelectorAll('th.sortable').forEach(t => { t.classList.remove('sort-asc','sort-desc'); });
    th.classList.add(sortDir===1?'sort-asc':'sort-desc');
    renderTable();
  });
});

function renderTable() {
  const q = (document.getElementById('search-input').value||'').toLowerCase();
  let rows = KEURINGEN.filter(k => {
    if(q && !k.naam.toLowerCase().includes(q) && !k.cat.toLowerCase().includes(q)) return false;
    const s = getStatus(k);
    if(activeFilter === 'open') return s === 'open';
    if(activeFilter === 'soon') return s === 'soon';
    if(activeFilter === 'krit') return s === 'krit';
    if(activeFilter === 'done') return s === 'done';
    return true;
  });

  if(sortCol) {
    rows.sort((a,b) => {
      const va = a[sortCol]??'', vb = b[sortCol]??'';
      if(typeof va === 'string') return va.localeCompare(vb)*sortDir;
      return (va-vb)*sortDir;
    });
  }

  if(!rows.length) {
    document.getElementById('tbl-body').innerHTML = `<tr><td colspan="7"><div class="no-results">Geen keuringen gevonden.</div></td></tr>`;
    document.getElementById('row-count').textContent = '0 keuringen';
    return;
  }

  // Group by category for section headers
  let lastCat = null;
  const html = [];
  rows.forEach(k => {
    if(k.cat !== lastCat) {
      const emoji = {Brandveiligheid:'🔥', Elektrisch:'⚡', Gebouw:'🏗️', Speeltoestellen:'🛝', Arbo:'🦺', Toezicht:'📋'}[k.cat]||'•';
      html.push(`<tr class="section-row"><td colspan="7">${emoji}  ${k.cat}</td></tr>`);
      lastCat = k.cat;
    }
    const s = state[k.id];
    const isDone = s.done;
    html.push(`<tr class="data-row${isDone?' done-row':''}" onclick="openModal(${k.id})">
      <td>${k.naam}</td>
      <td><span class="badge b-open" style="background:#F0F8FF;color:#1A5276">${k.cat}</span></td>
      <td>${k.freq}</td>
      <td>${k.verantw}</td>
      <td>${geplndLabel(k)}</td>
      <td>${statusBadge(k)}</td>
      <td class="chk-cell" onclick="event.stopPropagation();toggleDone(${k.id})">
        <div class="chk ${isDone?'checked':''}">${isDone?'✓':''}</div>
      </td>
    </tr>`);
  });

  document.getElementById('tbl-body').innerHTML = html.join('');
  document.getElementById('row-count').textContent = `${rows.length} van ${KEURINGEN.length} keuringen`;
}

function toggleDone(id) {
  state[id].done = !state[id].done;
  if(state[id].done) state[id].doneDate = new Date().toLocaleDateString('nl-NL');
  else state[id].doneDate = null;
  renderTable();
  renderKPI();
  renderVoortgang();
}

// ===================== MODAL =====================
function openModal(id) {
  const k = KEURINGEN.find(x => x.id === id);
  const s = state[id];
  const status = getStatus(k);
  const statusLbl = {done:'Afgerond',krit:'Verlopen',soon:'Binnenkort',open:'Gepland'};
  const statusCls = {done:'b-done',krit:'b-krit',soon:'b-soon',open:'b-open'};

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-eyebrow">${k.cat}</div>
    <div class="modal-title">${k.naam} <span class="badge ${statusCls[status]}">${statusLbl[status]}</span></div>
    <div class="modal-grid">
      <div class="modal-kpi"><div class="modal-kpi-label">Frequentie</div><div class="modal-kpi-val">${k.freq}</div></div>
      <div class="modal-kpi"><div class="modal-kpi-label">Verantwoordelijke</div><div class="modal-kpi-val">${k.verantw}</div></div>
      <div class="modal-kpi"><div class="modal-kpi-label">Gepland moment</div><div class="modal-kpi-val">${geplndLabel(k)}</div></div>
      <div class="modal-kpi"><div class="modal-kpi-label">Afgerond op</div><div class="modal-kpi-val">${s.doneDate||'—'}</div></div>
    </div>
    <div class="modal-note-label">Notities / bevindingen</div>
    <textarea class="modal-note-area" id="modal-note" placeholder="Voeg notities toe, bijv. naam keurder, keuringsrapport nr, opmerkingen…" oninput="state[${id}].note=this.value">${s.note}</textarea>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-primary ${s.done?'done-state':''}" id="modal-toggle-btn" onclick="toggleDoneFromModal(${id})">
        ${s.done ? '✓ Markeer als open' : '✓ Markeer als afgerond'}
      </button>
      <button class="modal-btn modal-btn-secondary" onclick="document.getElementById('modal-bg').classList.remove('open')">Sluiten</button>
    </div>
  `;
  document.getElementById('modal-bg').classList.add('open');
}

function toggleDoneFromModal(id) {
  toggleDone(id);
  const s = state[id];
  const btn = document.getElementById('modal-toggle-btn');
  if(btn) {
    btn.textContent = s.done ? '✓ Markeer als open' : '✓ Markeer als afgerond';
    btn.classList.toggle('done-state', s.done);
  }
}

function closeModalBg(e) {
  if(e.target.id==='modal-bg') document.getElementById('modal-bg').classList.remove('open');
}
document.addEventListener('keydown', e => { if(e.key==='Escape') document.getElementById('modal-bg').classList.remove('open'); });

// ===================== KALENDER =====================
function renderKalender() {
  const el = document.getElementById('kal-grid');
  // Build map: month → keuringen
  const map = {};
  for(let m=1;m<=12;m++) map[m]=[];
  KEURINGEN.forEach(k => {
    map[k.maand].push(k);
    if(k.maand2) map[k.maand2].push(k);
  });

  el.innerHTML = MAANDEN.map((mn, mi) => {
    const m = mi+1;
    const items = map[m];
    const isNow = m === NOW_MONTH;
    const itemsHtml = items.length ? items.map(k => {
      const s = getStatus(k);
      return `<div class="kal-item" onclick="openModal(${k.id})">
        <div class="kal-dot ${s}"></div>
        <div>
          <div class="kal-name">${k.naam}</div>
          <div class="kal-cat">${k.cat} · ${k.verantw}</div>
        </div>
      </div>`;
    }).join('') : `<div class="kal-empty">Geen keuringen gepland</div>`;

    return `<div class="kal-month" style="${isNow?'border-color:#E8602C;box-shadow:0 0 0 2px #F5C4A8':''}">
      <div class="kal-month-head">
        <div class="kal-month-title">${isNow?'📍 ':''}<strong>${mn}</strong></div>
        <div class="kal-count">${items.length} keuring${items.length!==1?'en':''}</div>
      </div>
      ${itemsHtml}
    </div>`;
  }).join('');
}

// ===================== VOORTGANG =====================
function renderVoortgang() {
  // Per categorie
  const cats = [...new Set(KEURINGEN.map(k=>k.cat))];
  const catColors = {Brandveiligheid:'#E8602C',Elektrisch:'#2E86C1',Gebouw:'#27AE60',Speeltoestellen:'#E6920A',Arbo:'#8E44AD',Toezicht:'#1ABC9C'};
  document.getElementById('prog-cats').innerHTML = cats.map(cat => {
    const items = KEURINGEN.filter(k=>k.cat===cat);
    const done = items.filter(k=>state[k.id].done).length;
    const pct = Math.round(done/items.length*100);
    const col = catColors[cat]||'#E8602C';
    return `<div class="prog-row">
      <div class="prog-label">${cat}</div>
      <div class="prog-bar-wrap"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="prog-pct" style="color:${col}">${pct}%</div>
    </div>`;
  }).join('');

  // Per kwartaal
  const kwData = [
    { lbl:'Q1 (Jan–Mrt)', months:[1,2,3] },
    { lbl:'Q2 (Apr–Jun)', months:[4,5,6] },
    { lbl:'Q3 (Jul–Sep)', months:[7,8,9] },
    { lbl:'Q4 (Okt–Dec)', months:[10,11,12] },
  ];
  document.getElementById('prog-kw').innerHTML = kwData.map(kw => {
    const items = KEURINGEN.filter(k => kw.months.includes(k.maand) || (k.maand2 && kw.months.includes(k.maand2)));
    if(!items.length) return `<div class="prog-row"><div class="prog-label">${kw.lbl}</div><div style="font-size:12px;color:#CCC">Geen keuringen</div></div>`;
    const done = items.filter(k=>state[k.id].done).length;
    const pct = Math.round(done/items.length*100);
    const col = pct>=80?'#27AE60':pct>=40?'#E6920A':'#C0392B';
    return `<div class="prog-row">
      <div class="prog-label">${kw.lbl}</div>
      <div class="prog-bar-wrap"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="prog-pct" style="color:${col}">${pct}%</div>
    </div>`;
  }).join('');
}

// ===================== EXPORT =====================
function exportCSV() {
  const rows = [['Keuring','Categorie','Frequentie','Verantwoordelijke','Gepland','Status','Afgerond op','Notitie']];
  KEURINGEN.forEach(k => {
    const s = state[k.id];
    rows.push([k.naam, k.cat, k.freq, k.verantw, geplndLabel(k), getStatus(k), s.doneDate||'', s.note.replace(/\n/g,' ')]);
  });
  const csv = rows.map(r => r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(';')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,%EF%BB%BF' + encodeURIComponent(csv);
  a.download = 'LeefKind_Keuringsregister_2026.csv';
  a.click();
}

// ===================== TAB SWITCH =====================
function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='kalender') renderKalender();
  if(id==='voortgang') { renderVoortgang(); animateBars(); }
}

function animateBars() {
  setTimeout(()=>{
    document.querySelectorAll('.prog-fill').forEach(el=>{
      const w=el.style.width; el.style.width='0';
      requestAnimationFrame(()=>{ el.style.width=w; });
    });
  },50);
}

// ===================== INIT =====================
renderKPI();
renderTable();
</script>
